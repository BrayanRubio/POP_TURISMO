<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>POP Turismo</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container-fluid vh-100">

<div class="row h-100">

<!-- ===================================================== -->
<!-- PANEL IZQUIERDO -->
<!-- ===================================================== -->

<div class="col-lg-4 panel-left">

<div class="logo text-center mb-4">

<div class="text-center mb-3">

    <i class="bi bi-airplane-engines-fill"
       style="font-size:70px;color:#0d6efd;"></i>

</div>

<h2>POP Turismo</h2>

<p class="text-muted">

Tu asistente turístico inteligente

</p>

</div>

<div class="card shadow-sm border-0">

<div class="card-body">

<h5 class="mb-4">

<i class="bi bi-sliders"></i>

Planifica tu viaje

</h5>
<!-- ========================= -->
<!-- Idioma -->
<!-- ========================= -->

<div class="mb-3">

    <label class="form-label">

        <i class="bi bi-translate"></i>

        Idioma

    </label>

    <select id="idioma" class="form-select">

        <option value="es">🇪🇸 Español</option>

        <option value="en">🇺🇸 English</option>

        <option value="fr">🇫🇷 Français</option>

        <option value="pt">🇧🇷 Português</option>

        <option value="de">🇩🇪 Deutsch</option>

        <option value="it">🇮🇹 Italiano</option>

    </select>

</div>



<!-- ========================= -->
<!-- Ciudad -->
<!-- ========================= -->

<div class="mb-3">

<label class="form-label">

<i class="bi bi-geo-alt-fill"></i>

Destino

</label>

<select
id="ciudad"
class="form-select">

<option value="">Seleccione una ciudad</option>

<option>Bogotá</option>

<option>Medellín</option>

<option>Cartagena</option>

<option>Santa Marta</option>

<option>San Andrés</option>

<option>Cali</option>

<option>Barranquilla</option>

<option>Bucaramanga</option>

<option>Pereira</option>

<option>Manizales</option>

</select>

</div>



<!-- ========================= -->
<!-- Fechas -->
<!-- ========================= -->

<div class="row mb-3">

<div class="col">

<label class="form-label">

Llegada

</label>

<input
type="date"
id="fecha_inicio"
class="form-control">

</div>

<div class="col">

<label class="form-label">

Salida

</label>

<input
type="date"
id="fecha_fin"
class="form-control">

</div>

</div>



<!-- ========================= -->
<!-- Tipo de viaje -->
<!-- ========================= -->

<div class="mb-3">

<label class="form-label">

<i class="bi bi-airplane-fill"></i>

Tipo de viaje

</label>

<select
id="tipo"
class="form-select">

<option>Vacaciones</option>

<option>Negocios</option>

<option>Familia</option>

<option>Mochilero</option>

<option>Romántico</option>

<option>Aventura</option>

</select>

</div>



<!-- ========================= -->
<!-- Presupuesto -->
<!-- ========================= -->

<div class="mb-3">

<label class="form-label">

<i class="bi bi-cash-stack"></i>

Presupuesto

</label>

<select
id="presupuesto"
class="form-select">

<option>Económico</option>

<option>Medio</option>

<option>Alto</option>

</select>

</div>



<!-- ========================= -->
<!-- Días -->
<!-- ========================= -->

<div class="mb-3">

<label class="form-label">

<i class="bi bi-calendar-week"></i>

Número de días

</label>

<input

type="number"

id="dias"

class="form-control"

value="3"

min="1"

>

</div>



<!-- ========================= -->
<!-- Viajeros -->
<!-- ========================= -->

<div class="mb-3">

<label class="form-label">

<i class="bi bi-people-fill"></i>

Viajeros

</label>

<input

type="number"

id="viajeros"

class="form-control"

value="2"

min="1"

>

</div>



<!-- ========================= -->
<!-- Transporte -->
<!-- ========================= -->

<div class="mb-3">

<label class="form-label">

<i class="bi bi-car-front-fill"></i>

Transporte

</label>

<select

id="transporte"

class="form-select">

<option>Vehículo propio</option>

<option>Transporte público</option>

<option>Taxi</option>

<option>Caminando</option>

<option>Bicicleta</option>

</select>

</div>



<!-- ========================= -->
<!-- Interés -->
<!-- ========================= -->

<div class="mb-4">

<label class="form-label">

<i class="bi bi-stars"></i>

Actividad principal

</label>

<select

id="intereses"

class="form-select">

<option>Playa</option>

<option>Gastronomía</option>

<option>Cultura</option>

<option>Aventura</option>

<option>Vida nocturna</option>

<option>Compras</option>

<option>Naturaleza</option>

<option>Historia</option>

</select>

</div>



<div class="d-grid gap-2">

<button

class="btn btn-primary btn-lg"

onclick="consultar()">

<i class="bi bi-send-fill"></i>

Generar recomendaciones

</button>



<button

class="btn btn-outline-secondary"

onclick="nuevoChat()">

<i class="bi bi-arrow-clockwise"></i>

Nuevo chat

</button>



<button

class="btn btn-success"

onclick="descargarPDF()">

<i class="bi bi-file-earmark-pdf-fill"></i>

Descargar guía

</button>

</div>

</div>

</div>

</div>
<!-- ===================================================== -->
<!-- PANEL DERECHO -->
<!-- ===================================================== -->

<div class="col-lg-8 panel-right">

    <div class="chat-container">

        <!-- Encabezado -->

        <div class="chat-header">

            <div class="d-flex align-items-center">

                <img src="{{ url_for('static', filename='logo.png') }}"
                     class="rounded-circle me-3"
                     width="55"
                     height="55">

                <div>

                    <h4 class="mb-0">

                        POP Turismo

                    </h4>

                    <small class="text-success">

                        <i class="bi bi-circle-fill"></i>

                        Asistente en línea

                    </small>

                </div>

            </div>

        </div>



        <!-- Conversación -->

        <div id="chat" class="chat-body">



            <!-- Mensaje inicial -->

            <div class="message bot">

                <div class="avatar">

                    🤖

                </div>

                <div class="bubble">

                    ¡Hola!

                    <br><br>

                    Soy tu asistente turístico.

                    <br><br>

                    Completa la información del viaje y prepararé una guía personalizada con hoteles, restaurantes y actividades.

                </div>

            </div>



        </div>



        <!-- Loader -->

        <div

            id="loader"

            class="text-center my-4"

            style="display:none;">

            <div class="spinner-border text-primary">

            </div>

            <br><br>

            <strong>

                Buscando las mejores recomendaciones...

            </strong>

        </div>



        <!-- Tarjetas -->

        <div

            id="resultado"

            class="mt-4">

        </div>



    </div>

</div>

</div>

</div>



<!-- ===================================================== -->
<!-- Bootstrap -->
<!-- ===================================================== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>



<!-- PDF -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>



<!-- Script principal -->

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
