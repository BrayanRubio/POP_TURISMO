<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POP Turismo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="app">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-earth-americas"></i>

            <div>

                <h1>POP Turismo</h1>

                <span>Travel Assistant</span>

            </div>

        </div>

        <div class="form-section">

            <h2>Planifica tu viaje</h2>

            <label>Destino</label>
            <input type="text" id="ciudad" placeholder="Ej: Cartagena">

            <label>Idioma</label>
            <select id="idioma">
                <option>Español</option>
                <option>English</option>
                <option>Français</option>
                <option>Português</option>
            </select>

            <label>Tipo de viaje</label>
            <select id="tipo">
                <option>Familiar</option>
                <option>Pareja</option>
                <option>Negocios</option>
                <option>Mochilero</option>
            </select>

            <label>Presupuesto</label>
            <select id="presupuesto">
                <option>Bajo</option>
                <option>Medio</option>
                <option>Alto</option>
            </select>

            <label>Días</label>
            <input type="number" id="dias" value="3">

            <label>Viajeros</label>
            <input type="number" id="viajeros" value="2">

            <label>Transporte</label>
            <select id="transporte">
                <option>Público</option>
                <option>Vehículo</option>
                <option>A pie</option>
            </select>

            <label>Intereses</label>
            <input
            type="text"
            id="intereses"
            placeholder="Playa, gastronomía, naturaleza">

            <button onclick="consultar()">
                <i class="fa-solid fa-paper-plane"></i>
                Generar Ruta
            </button>

        </div>

    </aside>

    <!-- CHAT -->

    <main class="chat-container">

        <div class="chat-header">

            <div class="header-left">

                <i class="fa-solid fa-robot"></i>

                <span>POP Turismo IA</span>

            </div>

        </div>

        <div id="chat" class="chat-body">

            <div class="message bot">

                <div class="avatar">
                    🤖
                </div>

                <div class="bubble">

                    Hola 👋

                    Soy POP Turismo.

                    Cuéntame cómo será tu viaje y prepararé una guía personalizada.

                </div>

            </div>

        </div>

    </main>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
