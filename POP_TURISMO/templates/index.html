<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>POP Turismo Inteligente</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<div class="panel">

<h1>🌎 POP Turismo Inteligente</h1>

<p>
Bienvenido.
Obtén recomendaciones personalizadas en segundos.
</p>

<label>Idioma</label>

<select id="idioma">
<option>Español</option>
<option>English</option>
<option>Français</option>
<option>Português</option>
</select>

<label>Ciudad destino</label>

<input id="ciudad" placeholder="Ej. Cartagena">

<label>Tipo de viaje</label>

<select id="tipo">
<option>Vacaciones</option>
<option>Negocios</option>
<option>Familia</option>
<option>Pareja</option>
<option>Mochilero</option>
</select>

<label>Presupuesto</label>

<input id="presupuesto">

<label>Días</label>

<input id="dias">

<label>Número de viajeros</label>

<input id="viajeros">

<label>Transporte</label>

<select id="transporte">
<option>Taxi</option>
<option>Bus</option>
<option>Vehículo alquilado</option>
<option>Caminando</option>
</select>

<label>Intereses</label>

<textarea
id="intereses"
rows="5"
placeholder="playas, museos, comida típica...">
</textarea>

<button onclick="consultar()">

✨ Generar recomendaciones

</button>

</div>

<div class="resultado">

<h2>Recomendaciones</h2>

<div id="respuesta">

Esperando consulta...

</div>

</div>

</div>

<script
src="{{ url_for('static', filename='script.js') }}">
</script>

</body>

</html>
